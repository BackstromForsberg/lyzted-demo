services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - server

  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=8080
      - CLIENT_ORIGIN=http://localhost:5173
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lyzted
    command: npm run startDev
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lyzted
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: